services:
  # Aspire Dashboard (OpenTelemetry metrics/traces/logs UI)
  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:latest
    container_name: acorn-aspire
    ports:
      - "18888:18888"   # Web UI
      - "4317:18889"    # OTLP gRPC receiver (mapped to host 4317)
    environment:
      - DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS=true
    restart: unless-stopped
    networks:
      - acorn-network

  # Acorn Server with MySQL (default for Docker)
  acorn:
    build:
      context: .
      dockerfile: src/Acorn/Dockerfile
    container_name: acorn
    ports:
      - "8078:8078"
      - "8079:8079"
    volumes:
      - ./src/Acorn/Data:/app/Data:ro
    environment:
      - Database__Engine=${DATABASE_ENGINE}
      - Database__ConnectionString=${DATABASE_CONNECTION_STRING}
      - Cache__Enabled=${CACHE_ENABLED}
      - Server__SLN__Enabled=${SERVER_SLN_ENABLED}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://aspire-dashboard:18889
    depends_on:
      mysql:
        condition: service_healthy
      aspire-dashboard:
        condition: service_started
    restart: unless-stopped
    networks:
      - acorn-network

  # MySQL Database (default for Docker)
  mysql:
    image: mysql:9.1
    container_name: acorn-mysql-db
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - acorn-network

  # Acorn API
  acorn-api:
    build:
      context: .
      dockerfile: src/Acorn.Api/Dockerfile
    container_name: acorn-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - Database__Engine=${DATABASE_ENGINE}
      - Database__ConnectionString=${DATABASE_CONNECTION_STRING}
      - Cache__Enabled=${CACHE_ENABLED}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - acorn-network

  # Acorn Server with SQLite (for profile: sqlite)
  acorn-sqlite:
    build:
      context: .
      dockerfile: src/Acorn/Dockerfile
    container_name: acorn-sqlite
    ports:
      - "8078:8078"
      - "8079:8079"
    volumes:
      - ./data/sqlite:/app/mnt
      - ./src/Acorn/Data:/app/Data:ro
    environment:
      - Database__Engine=SQLite
      - Database__ConnectionString=Data Source=/app/mnt/Acorn.db;
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://aspire-dashboard:18889
    depends_on:
      aspire-dashboard:
        condition: service_started
    restart: unless-stopped
    networks:
      - acorn-network
    profiles:
      - sqlite

  # Acorn Server with PostgreSQL
  acorn-postgres:
    build:
      context: .
      dockerfile: src/Acorn/Dockerfile
    container_name: acorn-postgres
    ports:
      - "8078:8078"
      - "8079:8079"
    volumes:
      - ./src/Acorn/Data:/app/Data:ro
    environment:
      - Database__Engine=PostgreSQL
      - Database__ConnectionString=Host=postgres;Port=5432;Database=acorn;Username=acorn;Password=acornpassword
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://aspire-dashboard:18889
    depends_on:
      postgres:
        condition: service_healthy
      aspire-dashboard:
        condition: service_started
    restart: unless-stopped
    networks:
      - acorn-network
    profiles:
      - postgres

  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: acorn-postgres-db
    environment:
      - POSTGRES_DB=acorn
      - POSTGRES_USER=acorn
      - POSTGRES_PASSWORD=acornpassword
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acorn -d acorn"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - acorn-network
    profiles:
      - postgres

  # Acorn Server with SQL Server (for profile: sqlserver)
  acorn-sqlserver:
    build:
      context: .
      dockerfile: src/Acorn/Dockerfile
    container_name: acorn-sqlserver
    ports:
      - "8078:8078"
      - "8079:8079"
    volumes:
      - ./src/Acorn/Data:/app/Data:ro
    environment:
      - Database__Engine=SqlServer
      - Database__ConnectionString=Server=sqlserver;Database=acorn;User Id=sa;Password=AcornPassword123!;TrustServerCertificate=True
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://aspire-dashboard:18889
    depends_on:
      sqlserver:
        condition: service_healthy
      aspire-dashboard:
        condition: service_started
    restart: unless-stopped
    networks:
      - acorn-network
    profiles:
      - sqlserver

  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: acorn-sqlserver-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=AcornPassword123!
      - MSSQL_PID=Developer
    volumes:
      - sqlserver-data:/var/opt/mssql
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P AcornPassword123! -C -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - acorn-network
    profiles:
      - sqlserver

volumes:
  postgres-data:
  mysql-data:
  sqlserver-data:

networks:
  acorn-network:
    driver: bridge
